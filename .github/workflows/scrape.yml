name: スケジュール自動取得

on:
  schedule:
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: スクレイパーを実行
        run: python scraper.py

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          if git diff --cached --quiet; then
            echo "新規予定なし — コミットをスキップ"
          else
            git commit -m "🤖 スケジュール自動更新 $(date +'%Y-%m-%d')"
            git push
          fi
